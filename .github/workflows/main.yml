name: 每日早安推送  # 工作流的名字，可以自定义

# 触发条件
on:
  schedule:
    # 定时任务：使用 cron 表达式。注意：GitHub Actions 使用的是 UTC 时间，北京时间是 UTC+8
    # 下面的 '0 23 * * *' 代表 UTC 时间每天 23:00，即北京时间第二天早上 7:00
    - cron: '0 23 * * *'
  workflow_dispatch:  # 允许手动触发，方便测试

jobs:
  push-job:
    runs-on: ubuntu-latest  # 使用最新版的 Ubuntu 系统作为运行环境[citation:2]

    steps:
      # 步骤1：拉取你仓库的代码
      - name: 拉取代码
        uses: actions/checkout@v4

      # 步骤2：设置 Python 环境
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # 指定 Python 版本

      # 步骤3：安装依赖
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 步骤4：运行你的主脚本
      - name: 运行推送脚本
        run: python daily_push.py
        # 这里通过环境变量，将 GitHub Secrets 里存储的 SendKey 传递给脚本
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
